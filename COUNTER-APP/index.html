<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTER APP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="Website Icon" href="https://cdn-icons-png.flaticon.com/128/17003/17003762.png" type="img/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
    </style>
</head>

<body>
    <div class="MainBody">
        <div class="TitleBody">
            <img src="https://cdn-icons-png.flaticon.com/128/17003/17003762.png" alt="Counter App Logo"
                draggable="false">
            <h1>COUNTER APP</h1>
            <h4>A simple counter bulit with Javascript</h4>
        </div>
        <div class="CounterBody">
            <h1 id="Count">0<h1>
                    <h4>Current Count</h4>
        </div>
        <div class="CountOptions">
            <div class="CountOption" id="Decrement" tabindex="0">
                <img src="https://cdn-icons-png.flaticon.com/128/1828/1828901.png" alt="Decrement" draggable="false">
                <h4>Decrement</h4>
            </div>
            <div class="CountOption" id="Increment" tabindex="0">
                <img src="http://cdn-icons-png.flaticon.com/128/3524/3524388.png" alt="Increment" draggable="false">
                <h4>Increment</h4>
            </div>
            <div class="CountOption" id="Reset" tabindex="0">
                <img src="https://cdn-icons-png.flaticon.com/128/54/54529.png" alt="Reset" draggable="false">
                <h4>Reset</h4>
            </div>
        </div>
        <div class="CounterMessage">
            <img src="https://cdn-icons-png.flaticon.com/128/7972/7972044.png" alt="Safety Logo" draggable="false">
            <h5>Count will not go bleow 0</h5>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
