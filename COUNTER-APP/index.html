<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTER APP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="Website Icon" href="https://img.icons8.com/stickers/100/counter.png" type="img/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
    </style>
</head>

<body>
    <div class="MainBody">
        <div class="TitleBody">
            <img src="https://img.icons8.com/stickers/100/counter.png" alt="Counter App Logo" draggable="false">
            <h1>COUNTER APP</h1>
            <h4>A simple counter bulit with Javascript</h4>
        </div>
        <div class="CounterBody">
            <h1 id="Count">0<h1>
                    <h4>Current Count</h4>
        </div>
        <div class="CountOptions">
            <div class="CountOption" id="Decrement" tabindex="0">
                <img src="https://img.icons8.com/sf-black-filled/64/FFFFFF/minus-math.png" alt="Decrement"
                    draggable="false">
                <h4>Decrement</h4>
            </div>
            <div class="CountOption" id="Increment" tabindex="0">
                <img src="https://img.icons8.com/ios-glyphs/30/FFFFFF/plus-math.png" alt="Increment" draggable="false">
                <h4>Increment</h4>
            </div>
            <div class="CountOption" id="Reset" tabindex="0">
                <img src="https://img.icons8.com/sf-black/64/FFFFFF/recurring-appointment.png" alt="Reset"
                    draggable="false">
                <h4>Reset</h4>
            </div>
        </div>
        <div class="CounterMessage">
            <img src="https://img.icons8.com/glyph-neue/64/FFFFFF/security-checked--v1.png" alt="Safety Logo" draggable="false">
            <h5>Count will not go bleow 0</h5>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
