<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="website icon" href="https://cdn-icons-png.flaticon.com/128/3082/3082854.png" type="image/png">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="mainBody">

            <div class="head">
                <img src="https://cdn-icons-png.flaticon.com/128/3082/3082854.png" alt="Website Logo" width="50px">
                <h1 id="heading">To-Do List</h1>
            </div>

            <div class="taskInput">
                <input type="text" placeholder="Enter a Task..." id="task">
                <button id="addBtn">Add</button>
            </div>

            <div class="tasks">
                <h3 class="tasklistHeading">Tasks</h3>
                <p id="noTask">Add Tasks to display</p>
                <ul class="taskList" id="taskList">

                </ul>


            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
