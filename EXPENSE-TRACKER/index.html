<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body style="font-family: 'Roboto Condensed', sans-serif;">
    <div id="sidebar" class="-translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out bg-red-400">
            <aside class="fixed top-0 left-0 h-full w-64 border-r border-gray-200 z-100 p-6 flex flex-col gap-6">

        <div class="flex justify-between items-center pb-4 border-b">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" alt="Logo" class="w-10">
                <h1 class="text-2xl font-bold text-gray-800">Tracker</h1>
            </div>
        </div>

        <nav class="flex flex-col gap-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold">📊
                Dashboard</a>
            <a href="#"
                class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">💸
                Expenses</a>
            <a href="#"
                class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">📈
                Analytics</a>
        </nav>
    </aside>
    </div>
    <div id="mainContent" class="md:ml-64">
        <header class="sticky top-0 z-50 bg-white shadow-sm">
            <nav class="h-16 px-4 md:py-10 flex items-center justify-between">
                <button id="menuBtn" class="text-3xl hover:scale-110 transition md:hidden">
                    ☰
                </button>

                <h1 class="flex-1 text-center text-xl md:text-3xl font-semibold">
                    Expense Tracker
                </h1>

                <div class="w-8"></div>

                <div class="hidden md:flex justify-center items-center gap-4">
                    <button id="addIncome"
                        class=" bg-green-500 text-white py-3 px-8 rounded-2xl text-xl font-bold hover:bg-green-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Income
                    </button>

                    <button id="addExpense"
                        class=" bg-red-500 text-white py-3 px-8 rounded-2xl text-xl font-bold hover:bg-red-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Expense
                    </button>
                </div>
            </nav>
        </header>

        <main class="flex flex-col justify-center items-center px-2 py-2">
            <section id="overview" class="flex w-full flex-col gap-4 p-4 items-center justify-center md:flex-row">
                <div
                    class="w-full flex items-center gap-6 px-6 py-5 bg-green-100 border border-green-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/3135/3135706.png" alt="Income Icon"
                        class="w-12 h-12 object-contain">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-gray-600 uppercase tracking-wider">Total Income</span>
                        <h2 class="text-2xl md:text-3xl text-green-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-6 px-6 py-5 bg-red-100 border border-red-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" alt="Expenses Icon"
                        class="w-12 h-12 object-contain">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-gray-600 uppercase tracking-wider">Total Expenses</span>
                        <h2 class="text-2xl md:text-3xl text-red-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-6 px-6 py-5 bg-blue-100 border border-blue-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/8049/8049428.png" alt="Balance Icon"
                        class="w-12 h-12 object-contain">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-gray-600 uppercase tracking-wider">Total Balance</span>
                        <h2 class="text-2xl md:text-3xl text-blue-700 font-bold">$ 0,000</h2>
                    </div>
                </div>
            </section>

            <section id="manager"
                class="flex flex-col sm:flex-row justify-center items-center gap-4 sm:gap-6 w-full px-4 my-6 md:hidden">
                <button id="addIncome"
                    class="w-full sm:w-auto sm:px-12 bg-green-500 text-white py-3 rounded-2xl text-xl font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Income
                </button>

                <button id="addExpense"
                    class="w-full sm:w-auto sm:px-12 bg-red-500 text-white py-3 rounded-2xl text-xl font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Expense
                </button>
            </section>
        </main>
    </div>


    <script>
        document.getElementById('sidebar')
    </script>
</body>

</html>
