<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Condensed', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 overflow-x-hidden">
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity duration-300 opacity-0">
    </div>

    <aside id="sidebar"
        class="fixed top-0 left-0 h-full w-[clamp(240px,18vw,320px)] bg-white border-r border-gray-200 z-50 p-[clamp(1rem,2vw,2rem)] flex flex-col gap-[clamp(1rem,1.5vw,2rem)] transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0">

        <div class="flex justify-between items-center pb-[clamp(0.5rem,1vw,1rem)] border-b">
            <div class="flex items-center gap-[clamp(0.5rem,1vw,1rem)]">
                <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" alt="Logo" draggable="false"
                    class="w-[clamp(2rem,3vw,3rem)] aspect-square object-cover">
                <h1 class="text-[clamp(1.25rem,2vw,1.75rem)] font-bold text-gray-800">Tracker</h1>
            </div>
            <button id="closeSidebarBtn"
                class="text-[clamp(1rem,1.5vw,1.5rem)] md:hidden text-gray-400 hover:text-gray-700">✕</button>
        </div>

        <nav class="flex flex-col gap-[clamp(0.25rem,0.5vw,0.75rem)]">
            <a href="#"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)] bg-blue-50 text-blue-600 rounded-xl font-bold text-[clamp(0.9rem,1.1vw,1.1rem)]">📊
                Dashboard</a>
            <a href="#"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)] text-gray-600 hover:bg-gray-100 rounded-xl transition text-[clamp(0.9rem,1.1vw,1.1rem)]">💸
                Expenses</a>
            <a href="#"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)] text-gray-600 hover:bg-gray-100 rounded-xl transition text-[clamp(0.9rem,1.1vw,1.1rem)]">📈
                Analytics</a>
        </nav>
        <div
            class="flex justify-center items-center gap-2 bg-red-500 rounded-2xl text-white font-semibold px-2 py-2 hover:bg-red-700 transition-colors ease-in-out active:scale-95 cursor-pointer mt-auto">
            <img src="https://img.icons8.com/parakeet-line/48/ffffff/filled-trash.png" alt="Clear Data" class="w-6">
            <span>Clear Data</span>
        </div>
    </aside>

    <div id="mainContent" class="md:ml-[clamp(240px,18vw,320px)] transition-all duration-300">
        <header class="sticky top-0 z-30 bg-white shadow-sm">
            <nav
                class="h-[clamp(3.5rem,8vh,5rem)] px-[clamp(1rem,3vw,2.5rem)] flex items-center justify-between relative">

                <button id="menuBtn"
                    class="text-[clamp(1.5rem,2.5vw,2.25rem)] hover:scale-110 transition md:hidden text-gray-700">
                    ☰
                </button>

                <ul id="mobileMenu"
                    class="absolute top-full left-0 w-full rounded-b-2xl flex flex-col bg-white items-center text-black text-lg border-t border-gray-100 md:hidden shadow-xl origin-top transform opacity-0 scale-95 pointer-events-none transition-all duration-300 ease-in-out z-50">
                    <li class="w-full text-center py-2 hover:bg-gray-200 transition-colors">
                        <a href="#" class="block w-full py-1">Home</a>
                    </li>
                    <li class="w-full text-center py-2 hover:bg-gray-200 transition-colors">
                        <a href="#overview" class="block w-full py-1">Overview</a>
                    </li>
                    <li class="w-full text-center py-2 hover:bg-gray-200 transition-colors">
                        <a href="#manager" class="block w-full py-1">Add Transaction</a>
                    </li>
                    <li class="w-full text-center py-2 hover:bg-gray-200 transition-colors">
                        <a href="#transactions" class="block w-full py-1">Transactions</a>
                    </li>
                </ul>

                <h1 class="flex-1 text-center text-[clamp(1.25rem,2.5vw,2.25rem)] font-semibold text-gray-800">
                    Expense Tracker
                </h1>

                <div class="w-[clamp(1.5rem,2vw,2.5rem)] md:hidden"></div>

                <div class="hidden md:flex justify-center items-center gap-[clamp(0.75rem,1.2vw,1.5rem)]">
                    <button id="addIncomeDesktop"
                        class="bg-green-500 text-white py-[clamp(0.5rem,1vw,0.85rem)] px-[clamp(1.25rem,2vw,2.5rem)] rounded-2xl text-[clamp(1rem,1.2vw,1.35rem)] font-bold hover:bg-green-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Income
                    </button>

                    <button id="addExpenseDesktop"
                        class="bg-red-500 text-white py-[clamp(0.5rem,1vw,0.85rem)] px-[clamp(1.25rem,2vw,2.5rem)] rounded-2xl text-[clamp(1rem,1.2vw,1.35rem)] font-bold hover:bg-red-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Expense
                    </button>
                </div>
            </nav>
        </header>

        <main
            class="flex flex-col justify-center items-center px-[clamp(0.5rem,1.5vw,1.5rem)] py-[clamp(0.5rem,1.5vw,1.5rem)]">
            <section id="overview"
                class="flex w-full flex-col gap-[clamp(1rem,1.5vw,2rem)] p-[clamp(0.75rem,1.5vw,2rem)] items-center justify-center md:flex-row">
                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-green-100 border border-green-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/3135/3135706.png" draggable="false"
                        alt="Income Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Income</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-green-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-red-100 border border-red-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" draggable="false"
                        alt="Expenses Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Expenses</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-red-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-blue-100 border border-blue-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/8049/8049428.png" draggable="false"
                        alt="Balance Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Balance</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-blue-700 font-bold">$ 0,000</h2>
                    </div>
                </div>
            </section>

            <section id="manager"
                class="flex flex-col sm:flex-row justify-center items-center gap-[clamp(0.75rem,1.2vw,1.5rem)] w-full px-[clamp(0.75rem,1.5vw,1.5rem)] my-[clamp(1rem,2vw,2.5rem)] md:hidden">
                <button id="addIncomeMobile"
                    class="w-full sm:w-auto sm:px-[clamp(2rem,4vw,4rem)] bg-green-500 text-white py-[clamp(0.65rem,1.2vw,1rem)] rounded-2xl text-[clamp(1.1rem,1.3vw,1.4rem)] font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Income
                </button>

                <button id="addExpenseMobile"
                    class="w-full sm:w-auto sm:px-[clamp(2rem,4vw,4rem)] bg-red-500 text-white py-[clamp(0.65rem,1.2vw,1rem)] rounded-2xl text-[clamp(1.1rem,1.3vw,1.4rem)] font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Expense
                </button>
            </section>
        </main>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const sidebar = document.getElementById('sidebar');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const overlay = document.getElementById('sidebarOverlay');

        // Toggle Mobile Dropdown Menu (Top Nav Menu)
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = mobileMenu.classList.contains('opacity-100');

            if (isOpen) {
                closeMobileMenu();
            } else {
                mobileMenu.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                mobileMenu.classList.add('opacity-100', 'scale-100');
            }
        });

        function closeMobileMenu() {
            mobileMenu.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            mobileMenu.classList.remove('opacity-100', 'scale-100');
        }

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        closeSidebarBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', () => {
            closeSidebar();
            closeMobileMenu();
        });

        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        document.addEventListener('click', (e) => {
            if (!mobileMenu.contains(e.target) && e.target !== menuBtn) {
                closeMobileMenu();
            }
        });
    </script>
</body>

</html>
