<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="src/output.css" rel="stylesheet">
</head>

<body>
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <nav class="h-16 px-4 flex items-center justify-between">
            <button id="menuBtn" class="text-3xl hover:scale-110 transition">
                ☰
            </button>

            <h1 class="flex-1 text-center text-xl font-semibold">
                Expense Tracker
            </h1>

            <div class="w-8"></div>
        </nav>
    </header>

    <Main>
        <section id="overview" class="flex flex-col mx-4 my-6 gap-2 items-center justify-center md:flex-row">
            <div class="px-6 py-6 bg-green-300 border border-green-400 flex justify-start gap-10 w-full rounded-2xl">
                <img src="https://cdn-icons-png.flaticon.com/128/3135/3135706.png" alt="Income" class="w-12 h-12">
                <div class="flex flex-col justify-center items-start">
                    <h2>Total Income</h2>
                    <h3 class="text-2xl md:text-3xl text-green-700 font-semibold">$ 0000</h3>
                </div>
            </div>
            <div class="px-6 py-6 bg-red-300 border border-red-400  flex justify-start gap-10 w-full rounded-2xl">
                <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" alt="Income" class="w-12 h-12">
                <div class="flex flex-col justify-center items-start">
                    <h2>Total Expenses</h2>
                    <h3 class="text-2xl md:text-3xl text-red-700 font-semibold">$ 0000</h3>
                </div>
            </div>
            <div class="px-6 py-6 bg-blue-300  border border-blue-400 flex justify-start gap-10 w-full rounded-2xl">
                <img src="https://cdn-icons-png.flaticon.com/128/8049/8049428.png" alt="Income" class="w-12 h-12">
                <div class="flex flex-col justify-center items-start">
                    <h2>Total Balance</h2>
                    <h3 class="text-2xl md:text-3xl text-blue-700 font-semibold">$ 0000</h3>
                </div>
            </div>
        </section>
    </Main>
</body>

</html>
