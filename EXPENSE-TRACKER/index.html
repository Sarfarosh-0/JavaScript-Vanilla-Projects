<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/9730/9730488.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: url(https://i.pinimg.com/736x/12/86/e4/1286e4cf09d92e1375360db43c2a89e0.jpg);
            background-size: cover;
        }
    </style>
</head>

<body class="bg-gray-50 text-black overflow-x-hidden">

    <aside id="sidebar"
        class="fixed top-0 left-0 h-full w-[clamp(240px,18vw,320px)] bg-white border-r border-gray-200 z-50 p-[clamp(1rem,2vw,2rem)] flex flex-col gap-[clamp(1rem,1.5vw,2rem)] transition-transform duration-500 ease-in-out -translate-x-full">

        <div class="flex justify-between items-center pb-[clamp(0.5rem,1vw,1rem)] border-b">
            <div class="flex items-center gap-[clamp(0.5rem,1vw,1rem)]">
                <img src="https://cdn-icons-png.flaticon.com/128/9730/9730488.png" alt="Logo" draggable="false"
                    class="w-[clamp(1.75rem,2.5vw,2.5rem)] aspect-square object-contain shrink-0">
                <h1 class="text-[clamp(1.25rem,2vw,1.75rem)] font-bold text-gray-800">Tracker</h1>
            </div>
            <button id="closeSidebarBtn" aria-label="Close Sidebar"
                class="text-[clamp(1rem,2.5vw,1.5rem)] font-bold text-gray-400 hover:text-gray-700 transition-colors cursor-pointer select-none">✕</button>
        </div>

        <nav class="flex flex-col gap-[clamp(0.25rem,0.5vw,0.75rem)]">
            <a href="#overview"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)]  text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-[clamp(0.9rem,1.1vw,1.1rem)] transition-all duration-100 ease-in-out">
                <img src="https://cdn-icons-png.flaticon.com/128/3408/3408591.png" alt="DashBoard" draggable="false"
                    class="w-6 aspect-square object-contain " />
                <span>DashBoard</span>
            </a>
            <a href="#overview"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)]  text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-[clamp(0.9rem,1.1vw,1.1rem)] transition-all duration-100 ease-in-out">
                <img src="https://cdn-icons-png.flaticon.com/128/781/781831.png" alt="Add Expenses" draggable="false"
                    class="w-6 aspect-square object-contain " />
                <span>Add Expenses</span>
            </a>
            <a href="#transactions"
                class="flex items-center gap-[clamp(0.5rem,1vw,1rem)] px-[clamp(0.75rem,1vw,1.25rem)] py-[clamp(0.5rem,0.8vw,1rem)]  text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-[clamp(0.9rem,1.1vw,1.1rem)] transition-all duration-100 ease-in-out">
                <img src="https://cdn-icons-png.flaticon.com/128/3186/3186949.png" alt="All Transactions"
                    draggable="false" class="w-6 aspect-square object-contain " />
                <span>All Transactions</span>
            </a>
        </nav>
        <button type="button"
            class="flex justify-center items-center gap-2 bg-red-500 rounded-2xl text-white font-semibold px-2 py-2 hover:bg-red-700 transition-colors ease-in-out active:scale-95 cursor-pointer mt-auto w-full">
            <img src="https://img.icons8.com/parakeet-line/48/ffffff/filled-trash.png" alt="Clear Data"
                class="w-4 aspect-square object-contain shrink-0">
            <span>Clear Data</span>
        </button>
    </aside>

    <div id="mainContent" class="transition-all duration-500 ease-in-out">
        <header class="sticky top-0 z-30 bg-white py-2 shadow-sm">
            <nav
                class="h-[clamp(3.5rem,8vh,5rem)] px-[clamp(1rem,3vw,2.5rem)] flex items-center justify-between relative">

                <div class="flex items-center justify-center">
                    <button id="sidebarToggleBtn" aria-label="Open Sidebar"
                        class="text-[clamp(1.5rem,2.2vw,2.25rem)] hover:scale-110 transition text-black select-none">
                        ☰
                    </button>
                </div>
                <h1 class="flex-1 text-center text-[clamp(1.25rem,2.5vw,2.25rem)] font-semibold text-black">
                    Expense Tracker
                </h1>

                <div class="w-[clamp(1.5rem,2vw,2.5rem)] md:hidden"></div>

                <div class="hidden md:flex justify-center items-center gap-[clamp(0.75rem,1.2vw,1.5rem)]">
                    <button id="addIncomeDesktop"
                        class="bg-green-500 text-white py-[clamp(0.5rem,1vw,0.85rem)] px-[clamp(1.25rem,2vw,2.5rem)] rounded-2xl text-[clamp(1rem,1.2vw,1.35rem)] font-bold hover:bg-green-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Income
                    </button>

                    <button id="addExpenseDesktop"
                        class="bg-red-500 text-white py-[clamp(0.5rem,1vw,0.85rem)] px-[clamp(1.25rem,2vw,2.5rem)] rounded-2xl text-[clamp(1rem,1.2vw,1.35rem)] font-bold hover:bg-red-700 active:scale-90 transition-all duration-300 shadow-sm">
                        + Add Expense
                    </button>
                </div>
            </nav>
        </header>

        <main
            class="flex flex-col justify-center items-center px-[clamp(0.5rem,1.5vw,1.5rem)] py-[clamp(0.5rem,1.5vw,1.5rem)]">
            <section id="overview"
                class="flex w-full flex-col gap-[clamp(1rem,1.5vw,2rem)] p-[clamp(0.75rem,1.5vw,2rem)] items-center justify-center md:flex-row">
                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-green-100 border border-green-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/3135/3135706.png" draggable="false"
                        alt="Income Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Income</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-green-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-red-100 border border-red-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" draggable="false"
                        alt="Expenses Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Expenses</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-red-700 font-bold">$ 0,000</h2>
                    </div>
                </div>

                <div
                    class="w-full flex items-center gap-[clamp(1rem,1.8vw,2rem)] px-[clamp(1rem,2vw,2rem)] py-[clamp(1rem,1.5vw,1.75rem)] bg-blue-100 border border-blue-300 rounded-2xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/8049/8049428.png" draggable="false"
                        alt="Balance Icon" class="w-[clamp(2.5rem,4vw,3.5rem)] aspect-square object-contain">
                    <div class="flex flex-col">
                        <span
                            class="text-[clamp(0.75rem,0.9vw,0.95rem)] font-medium text-gray-600 uppercase tracking-wider">Total
                            Balance</span>
                        <h2 class="text-[clamp(1.35rem,2.2vw,2.25rem)] text-blue-700 font-bold">$ 0,000</h2>
                    </div>
                </div>
            </section>

            <section id="manager"
                class="flex flex-col sm:flex-row justify-center items-center gap-[clamp(0.75rem,1.2vw,1.5rem)] w-full px-[clamp(0.75rem,1.5vw,1.5rem)] my-[clamp(1rem,2vw,2.5rem)] md:hidden">
                <button id="addIncomeMobile"
                    class="w-full sm:w-auto sm:px-[clamp(2rem,4vw,4rem)] bg-green-500 text-white py-[clamp(0.65rem,1.2vw,1rem)] rounded-2xl text-[clamp(1.1rem,1.3vw,1.4rem)] font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Income
                </button>

                <button id="addExpenseMobile"
                    class="w-full sm:w-auto sm:px-[clamp(2rem,4vw,4rem)] bg-red-500 text-white py-[clamp(0.65rem,1.2vw,1rem)] rounded-2xl text-[clamp(1.1rem,1.3vw,1.4rem)] font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm">
                    + Add Expense
                </button>
            </section>
        </main>
    </div>

    <script>
        const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const mainContent = document.getElementById('mainContent');

        sidebarToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = sidebar.classList.contains('-translate-x-full');
            isHidden ? openSidebar() : closeSidebar();
        });

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarToggleBtn.classList.add('hidden');

            if (window.innerWidth >= 768) {
                mainContent.classList.add('md:ml-[clamp(240px,18vw,320px)]');
            }
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarToggleBtn.classList.remove('hidden');

            if (window.innerWidth >= 768) {
                mainContent.classList.remove('md:ml-[clamp(240px,18vw,320px)]');
            }
        }

        closeSidebarBtn.addEventListener('click', closeSidebar);
    </script>
</body>

</html>
