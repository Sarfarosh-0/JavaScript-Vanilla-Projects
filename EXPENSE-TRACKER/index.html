<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/9730/9730488.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(rgba(249, 250, 251, 0.4), rgba(249, 250, 251, 0.4)),
                url('https://i.pinimg.com/736x/12/86/e4/1286e4cf09d92e1375360db43c2a89e0.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="text-black overflow-x-hidden ">

    <aside id="sidebar" aria-label="Primary Navigation"
        class="fixed top-0 left-0 h-full w-52 bg-white border-r border-gray-200 z-50 p-4 flex flex-col gap-5 transition-transform duration-500 ease-in-out -translate-x-full">

        <div class="flex justify-between items-center pb-3 h-16  border-b border-gray-100">
            <div class="flex items-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/128/9730/9730488.png" alt="Logo" draggable="false"
                    class="w-8 h-8 object-contain shrink-0">
                <h1 class="text-2xl font-bold text-gray-800">Tracker</h1>
            </div>
            <button id="closeSidebarBtn" aria-label="Close Sidebar"
                class="text-xl text-gray-400 hover:text-gray-700 transition-colors cursor-pointer select-none">
                <span aria-hidden="true">✕</span>
            </button>
        </div>

        <nav class="flex flex-col gap-1.5">
            <a href="#overview"
                class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-sm transition-all duration-100 ease-in-out">
                <img src="https://cdn-icons-png.flaticon.com/128/3408/3408591.png" alt="Dashboard" draggable="false"
                    class="w-5 h-5 object-contain" />
                <span>DashBoard</span>
            </a>
            <a href="#overview"
                class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-sm transition-all duration-100 ease-in-out">
                <img src="https://img.icons8.com/color/48/bullish.png" alt="Add Expenses" draggable="false"
                    class="w-5 h-5 object-contain" />
                <span>Income</span>
            </a>
            <a href="#overview"
                class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-sm transition-all duration-100 ease-in-out">
                <img src="https://img.icons8.com/color/48/bearish.png" alt="Add Expenses" draggable="false"
                    class="w-5 h-5 object-contain" />
                <span>Expenses</span>
            </a>
            <a href="#transactions"
                class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-xl hover:font-bold text-sm transition-all duration-100 ease-in-out">
                <img src="https://cdn-icons-png.flaticon.com/128/3186/3186949.png" alt="All Transactions"
                    draggable="false" class="w-5 h-5 object-contain" />
                <span>Transactions</span>
            </a>
        </nav>

        <button type="button"
            class="flex justify-center items-center gap-2 bg-red-500 rounded-xl text-white font-semibold px-3 py-2 text-sm hover:bg-red-700 transition-colors ease-in-out active:scale-95 cursor-pointer mt-auto w-full">
            <img src="https://img.icons8.com/parakeet-line/48/ffffff/filled-trash.png" alt="Clear Data"
                class="w-4 h-4 object-contain shrink-0">
            <span>Clear Data</span>
        </button>
    </aside>

    <div id="mainContent" class="transition-all duration-500 ease-in-out">
        <header class="sticky top-0 z-30 bg-white py-3 shadow-sm">
            <nav class="h-16 px-4 md:pl-6 md:pr-8 flex items-center justify-between relative">
                <div class="flex items-center justify-center">
                    <button id="sidebarToggleBtn" aria-label="Open Sidebar"
                        class="text-2xl hover:scale-110 transition text-black select-none">
                        ☰
                    </button>
                </div>

                <h1 class="flex-1 text-center text-lg md:text-4xl font-semibold text-black tracking-tight">
                    Expense Tracker
                </h1>

                <div class="w-8 md:hidden"></div>

                <div class="hidden md:flex justify-center items-center gap-3">
                    <button id="addIncomeDesktop"
                        class="bg-green-500 text-white py-2 px-4 rounded-lg text-lg font-bold hover:bg-green-700 active:scale-90 transition-all duration-300 shadow-sm cursor-pointer">
                        + Add Income
                    </button>
                    <button id="addExpenseDesktop"
                        class="bg-red-500 text-white py-2 px-4 rounded-lg text-lg font-bold hover:bg-red-700 active:scale-90 transition-all duration-300 shadow-sm cursor-pointer">
                        + Add Expense
                    </button>
                </div>
            </nav>
        </header>

        <main class="flex flex-col justify-center items-center p-4 md:py-6 md:pr-6 md:pl-6">
            <section id="overview" class="flex w-full flex-col gap-4 items-center justify-center lg:flex-row">

                <div
                    class="w-full flex items-center gap-3 p-4 bg-green-100 border border-green-300 rounded-xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/3135/3135706.png" draggable="false"
                        alt="Income Icon" class="w-10 h-10 object-contain">
                    <div class="flex flex-col min-w-0">
                        <span class="text-xs font-medium text-gray-600 uppercase tracking-wider truncate">Total
                            Income</span>
                        <h2 class="text-xl md:text-2xl text-green-700 font-bold whitespace-nowrap">$ 0,000</h2>
                    </div>
                </div>

                <div class="w-full flex items-center gap-3 p-4 bg-red-100 border border-red-300 rounded-xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/10758/10758868.png" draggable="false"
                        alt="Expenses Icon" class="w-10 h-10 object-contain">
                    <div class="flex flex-col min-w-0">
                        <span class="text-xs font-medium text-gray-600 uppercase tracking-wider truncate">Total
                            Expenses</span>
                        <h2 class="text-xl md:text-2xl text-red-700 font-bold whitespace-nowrap">$ 0,000</h2>
                    </div>
                </div>

                <div class="w-full flex items-center gap-3 p-4 bg-blue-100 border border-blue-300 rounded-xl shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/128/8049/8049428.png" draggable="false"
                        alt="Balance Icon" class="w-10 h-10 object-contain">
                    <div class="flex flex-col min-w-0">
                        <span class="text-xs font-medium text-gray-600 uppercase tracking-wider truncate">Total
                            Balance</span>
                        <h2 class="text-xl md:text-2xl text-blue-700 font-bold whitespace-nowrap">$ 0,000</h2>
                    </div>
                </div>
            </section>

            <section id="manager"
                class="flex flex-col sm:flex-row justify-center items-center gap-3 w-full mt-5 md:hidden">
                <button id="addIncomeMobile"
                    class="w-full bg-green-500 text-white py-2.5 px-4 rounded-lg text-lg font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm cursor-pointer">+
                    Add Income</button>
                <button id="addExpenseMobile"
                    class="w-full bg-red-500 text-white py-2.5 px-4 rounded-lg text-lg font-bold hover:scale-105 active:scale-95 transition-all duration-300 shadow-sm cursor-pointer">+
                    Add Expense</button>
            </section>

            <section id="transactions"
                class="flex items-center flex-col p-4 m-4 rounded-2xl border-2 shadow-lg w-full min-h-96 bg-white">
                <div class="flex justify-between w-full px-2 py-4">
                    <h1 class="text-2xl font-semibold">Recent Transactions</h1>
                    <a href="#" class="text-blue-500 hover:underline hover:font-bold transition-all">View All</a>
                </div>

                <div id="transactionsHistory" class="w-full grid grid-cols-4 gap-y-4 px-2 items-center text-sm md:text-base">
                    <div class="contents text-gray-600 font-bold">
                        <span>Date</span>
                        <span>Description</span>
                        <span>Type</span>
                        <span class="text-right">Amount</span>
                    </div>

                    <div class="contents border-b border-gray-100">
                        <span>20 May 2024</span>
                        <span>Movie</span>
                        <span class="text-red-500 font-medium">Expense</span>
                        <span class="text-right text-red-600 font-semibold">- $1,000</span>
                    </div>

                    <div class="contents border-b border-gray-100">
                        <span>20 May 2025</span>
                        <span>Salary</span>
                        <span class="text-green-500 font-medium">Income</span>
                        <span class="text-right font-semibold text-green-600">+ $45,000</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const mainContent = document.getElementById('mainContent');

        sidebarToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = sidebar.classList.contains('-translate-x-full');
            isHidden ? openSidebar() : closeSidebar();
        });

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarToggleBtn.classList.add('hidden');

            if (window.innerWidth >= 768) {
                mainContent.classList.add('md:ml-52');
            }
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarToggleBtn.classList.remove('hidden');

            if (window.innerWidth >= 768) {
                mainContent.classList.remove('md:ml-52');
            }
        }

        closeSidebarBtn.addEventListener('click', closeSidebar);
    </script>
</body>

</html>
