<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="website icon" href="https://cdn-icons-png.flaticon.com/128/3964/3964691.png">
    <title>Color Changer</title>
</head>

<body>
    <main>
        <div class="TitleBody">
            <h1>Color Changer</h1>
            <p>Click on a color Button or Generate a random color</p>
        </div>
        <div class="ColorOptions">
            <button id="redBtn" class="ColorBtn"></button>
            <button id="blueBtn" class="ColorBtn"></button>
            <button id="greenBtn" class="ColorBtn"></button>
            <button id="yellowBtn" class="ColorBtn"></button>
            <button id="purpleBtn" class="ColorBtn"></button>
            <button id="orangeBtn" class="ColorBtn"></button>
        </div>
        <div class="RandomBtn">
            <button id="randomColor" class="RandomBtn">
                <img src="https://cdn-icons-png.flaticon.com/128/8944/8944340.png" alt="Random">
                Random Color
            </button>
        </div>
        <div class="ColorBox" id="ColorBox">
            <p id="ColorName">Background color Preview</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
