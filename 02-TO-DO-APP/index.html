<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="website icon"
        href="https://img.icons8.com/external-smashingstocks-flat-smashing-stocks/66/external-Todo-List-smooth-conceptual-smashingstocks-flat-smashing-stocks.png"
        type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="mainBody">
        <Header>
            <div class="titleBox">
                <img src="https://img.icons8.com/external-smashingstocks-flat-smashing-stocks/66/external-Todo-List-smooth-conceptual-smashingstocks-flat-smashing-stocks.png"
                    alt="Logo" draggable="false">
                <h1 class="title">My To-Do List</h1>
            </div>
            <button id="themeBtn">
                <img src="https://cdn-icons-png.flaticon.com/128/7549/7549325.png" alt="theme" draggable="false" id="themeImage">
            </button>
        </Header>

        <Main>
            <div class="inputBtn" id="handelEnter">
                <input type="text" placeholder="Add your task here..." id="task">
                <button id="addBtn">Add Task</button>
            </div>

            <div class="Options">
                <div class="list">
                    <span id="allTask" class="selected">All</span>
                    <span id="activeTask">Active</span>
                    <span id="completedTask">Completed</span>
                </div>
                <span id="totalTask">0 Tasks</span>
            </div>

            <div class="Tasks" id="Tasks"></div>
        </Main>

    </div>

    <script src="script.js"></script>
</body>

</html>
