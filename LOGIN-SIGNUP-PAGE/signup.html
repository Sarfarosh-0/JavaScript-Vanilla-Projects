<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="website icon" href="https://cdn-icons-png.flaticon.com/128/2250/2250207.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>SignUp</h1>
                <p>Enter your details for signup</p>
            </div>

            <form id="authForm" novalidate>
                <div class="input-group">
                    <label for="userEmail">Email</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="Enter your email" id="userEmail" required>
                    </div>
                    <p class="hint" id="emailHint"></p>
                </div>

                <div class="input-group">
                    <label for="userPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" placeholder="Enter your password" id="userPassword" required>
                        <button id="showPassword" type="button" aria-label="Toggle password visibility">Show</button>
                    </div>
                    <p class="hint" id="passwordHint"></p>
                </div>

                <button id="submitButton" class="submit-btn" type="submit">Login</button>
            </form>

            <div class="auth-footer">
                <span>Alreday have an account?</span> <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
