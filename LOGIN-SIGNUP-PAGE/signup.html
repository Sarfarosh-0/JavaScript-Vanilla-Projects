<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="website icon" href="https://cdn-icons-png.flaticon.com/128/2250/2250207.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>

<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Sign Up</h1>
                <p>Enter your details to Signup</p>
            </div>

            <form id="authForm" novalidate>
                <!-- Email Group -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="email" id="userEmail" required placeholder=" ">
                        <label for="userEmail">Email</label>
                    </div>
                    <p class="hint" id="emailHint"></p>
                </div>

                <!-- Password Group -->
                <div class="input-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="userPassword" required placeholder=" ">
                        <label for="userPassword">Create Password</label>
                    </div>
                    <p class="hint" id="passwordHint"></p>
                </div>

                <!-- Confirm Password Group -->
                <div class="input-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="cnfUserPassword" required placeholder=" ">
                        <button id="showPassword" type="button" aria-label="Toggle password visibility">Show</button>
                        <label for="cnfUserPassword">Confirm Password</label>
                    </div>
                    <p class="hint" id="cnfPasswordHint"></p>
                </div>

                <button id="submitButton" class="submit-btn" type="submit">Sign Up</button>
            </form>

            <div class="auth-footer">
                <span>Already have an account?</span> <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
