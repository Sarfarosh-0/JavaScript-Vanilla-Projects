<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Orbitron", sans-serif;
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen bg-slate-950 p-4 font-sans select-none">
    <main class="relative w-80 bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl p-5 shadow-2xl shadow-indigo-950/20 flex flex-col gap-4 overflow-hidden">
        
        <!-- Ambient Background Glows -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-teal-500/10 rounded-full blur-2xl pointer-events-none"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl pointer-events-none"></div>

        <!-- Display Screen -->
        <section id="resultBody"
            class="relative z-10 w-full bg-slate-950/40 border border-slate-800/50 rounded-2xl h-36 p-4 flex flex-col justify-end items-end gap-1 shadow-inner">
            <h1 id="numbers" class="text-slate-400 text-sm tracking-wide break-all font-medium transition-all duration-200">2+2</h1>
            <h1 id="result" class="text-white text-4xl font-light tracking-tight break-all transition-all duration-200">4</h1>
        </section>

        <!-- Input Keypad -->
        <section id="inputBody" class="relative z-10 grid grid-cols-4 gap-3 w-full aspect-square">

            <!-- Row 1: Actions & Operators -->
            <button class="content text-lg font-semibold rounded-2xl text-rose-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                C
            </button>
            <button class="content rounded-2xl text-rose-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75L14.25 12m0 0l2.25 2.25M14.25 12l2.25-2.25M14.25 12L12 14.25m-2.58 4.92l-6.375-6.375a1.125 1.125 0 010-1.59L9.42 4.83c.211-.211.498-.33.796-.33H19.5a2.25 2.25 0 012.25 2.25v10.5a2.25 2.25 0 01-2.25 2.25h-9.284c-.298 0-.585-.119-.796-.33z" />
                </svg>
            </button>
            <button class="content rounded-2xl text-teal-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6h.008v.008H6V6zm12 12h.008v.008H18V18z" />
                </svg>
            </button>
            <button class="content rounded-2xl text-indigo-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <circle cx="12" cy="6" r="1.5" fill="currentColor" />
                    <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-linecap="round" />
                    <circle cx="12" cy="18" r="1.5" fill="currentColor" />
                </svg>
            </button>

            <!-- Row 2: Numbers & Multiply -->
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                7
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                8
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                9
            </button>
            <button class="content rounded-2xl text-indigo-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Row 3: Numbers & Subtract -->
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                4
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                5
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                6
            </button>
            <button class="content rounded-2xl text-indigo-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                </svg>
            </button>

            <!-- Row 4: Numbers & Add -->
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                1
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                2
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                3
            </button>
            <button class="content rounded-2xl text-indigo-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>

            <!-- Row 5: Parentheses, Zero, Decimal & Equals -->
            <button class="content text-lg font-medium rounded-2xl text-teal-400 bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/20 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                ()
            </button>
            <button class="content text-xl font-medium rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                0
            </button>
            <button class="content text-2xl font-bold rounded-2xl text-slate-200 bg-slate-800/20 hover:bg-slate-800/30 border border-slate-800/50 active:scale-95 transition-all duration-150 flex justify-center items-center aspect-square">
                .
            </button>
            <button class="content rounded-2xl text-white bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/20 active:scale-95 active:shadow-none transition-all duration-150 flex justify-center items-center aspect-square">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 9h15m-15 6h15" />
                </svg>
            </button>

        </section>
    </main>
</body>

</html>
