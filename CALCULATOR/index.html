<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Orbitron", sans-serif;
        }
    </style>
</head>

<body class="flex justify-center items-center bg-gray-100 min-h-screen">
    <main
        class="flex flex-col gap-2 border border-slate-300 bg-white/50 backdrop-blur-md w-80 rounded-2xl h-full m-10 shadow-xl shadow-slate-900/5">

        <!-- Display Unit -->
        <section id="resultBody"
            class="w-full bg-white rounded-t-2xl h-32 p-3 overflow-auto flex flex-col justify-center items-end gap-2 shadow-inner">
            <h1 id="numbers" class="text-3xl text-slate-800">2+2</h1>
            <h1 id="result" class="text-2xl text-slate-500">4</h1>
        </section>

        <!-- Keypad Interface -->
        <section id="inputBody" class="grid grid-cols-4 grid-rows-5 gap-2 p-6 w-full aspect-square">

            <!-- Row 1: Primary Controls & Division -->
            <button
                class="content text-2xl uppercase rounded-full text-red-500 bg-white border border-slate-100 hover:bg-black hover:text-white shadow-red-500 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                C
            </button>
            <button
                class="content text-2xl uppercase rounded-full text-red-500 bg-white border border-slate-100 hover:bg-black hover:text-white shadow-red-500 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Backspace">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9.75L14.25 12m0 0l2.25 2.25M14.25 12l2.25-2.25M14.25 12L12 14.25m-2.58 4.92l-6.375-6.375a1.125 1.125 0 010-1.59L9.42 4.83c.211-.211.498-.33.796-.33H19.5a2.25 2.25 0 012.25 2.25v10.5a2.25 2.25 0 01-2.25 2.25h-9.284c-.298 0-.585-.119-.796-.33z" />
                </svg>
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Percentage">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 18L18 6M6 6h.008v.008H6V6zm12 12h.008v.008H18V18z" />
                </svg>
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Divide">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <circle cx="12" cy="6" r="1.5" fill="currentColor" />
                    <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-linecap="round" />
                    <circle cx="12" cy="18" r="1.5" fill="currentColor" />
                </svg>
            </button>

            <!-- Row 2: Numerics (7-9) & Multiplication -->
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                7
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                8
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                9
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Multiply">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Row 3: Numerics (4-6) & Subtraction -->
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                4
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                5
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                6
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Subtract">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                </svg>
            </button>

            <!-- Row 4: Numerics (1-3) & Addition -->
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                1
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                2
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                3
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Add">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>

            <!-- Row 5: Structural Modifiers, Zero, Radix Point & Evaluation -->
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                ()
            </button>
            <button
                class="content text-2xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                0
            </button>
            <button
                class="content text-4xl uppercase rounded-full  bg-white border border-slate-100 hover:bg-black hover:text-white shadow-green-300 active:shadow-lg active:scale-95 aspect-square transition-all duration-200 flex justify-center items-center">
                .
            </button>
            <button
                class="content text-2xl uppercase rounded-full text-white bg-green-500 border border-green-600/20  hover:bg-green-600 active:scale-95  aspect-square transition-all duration-200 flex justify-center items-center"
                aria-label="Equal To">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 9h15m-15 6h15" />
                </svg>
            </button>

        </section>
    </main>
</body>

</html>
