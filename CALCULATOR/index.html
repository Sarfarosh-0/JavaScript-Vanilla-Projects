<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="src/output.css" rel="stylesheet">
    <link rel="shortcut icon" href="https://img.icons8.com/doodle/48/apple-calculator.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <style>
        body {
            font-family: "Orbitron", sans-serif;
        }

        .greenButton {
            --neon-green: #39ff14;
            cursor: pointer;
            outline: none;

            &:active {
                box-shadow:
                    0 0 4px #fff,
                    0 0 10px var(--neon-green);
            }
        }

        .redButton {
            --neon-red: #ff003c;
            cursor: pointer;
            outline: none;

            &:active {
                box-shadow:
                    0 0 4px #fff,
                    0 0 10px var(--neon-red);
            }
        }

        #inputBody {
            background: #ECE9E6;
            background: -webkit-linear-gradient(to bottom, #FFFFFF, #ECE9E6);
            background: linear-gradient(to bottom, #FFFFFF, #ECE9E6);
        }
    </style>
</head>

<body class="bg-slate-50 flex justify-center items-center min-h-screen">
    <main
        class="flex flex-col border border-slate-300 w-full h-full md:h-full md:w-80 bg-gray-100 rounded-2xl overflow-hidden shadow-xl shadow-slate-900/10">
        <!-- Display Unit -->
        <section id="resultBody"
            class="w-full bg-white rounded-t-2xl h-full md:h-52 p-5 overflow-hidden border-b border-slate-300 flex flex-col justify-end items-end gap-5">
            <h1 id="numbers"
                class="text-3xl text-slate-800 max-w-full overflow-y-scroll scrollbar-none whitespace-nowrap">
            </h1>
            <h1 id="result"
                class="text-xl font-semibold text-slate-400 max-w-full overflow-y-scroll scrollbar-none whitespace-nowrap">
            </h1>
        </section>

        <!-- Keypad Interface -->
        <section id="inputBody"
            class="grid grid-cols-4 gap-3 p-5 rounded-b-2xl w-full items-center justify-items-center">

            <!-- Row 1: Primary Controls & Division -->
            <button
                class="redButton text-xl font-bold uppercase rounded-full text-red-500 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                C
            </button>
            <button
                class="redButton text-xl font-bold uppercase rounded-full text-red-500 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Backspace">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9.75L14.25 12m0 0l2.25 2.25M14.25 12l2.25-2.25M14.25 12L12 14.25m-2.58 4.92l-6.375-6.375a1.125 1.125 0 010-1.59L9.42 4.83c.211-.211.498-.33.796-.33H19.5a2.25 2.25 0 012.25 2.25v10.5a2.25 2.25 0 01-2.25 2.25h-9.284c-.298 0-.585-.119-.796-.33z" />
                </svg>
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Percentage">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 18L18 6M6 6h.008v.008H6V6zm12 12h.008v.008H18V18z" />
                </svg>
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Divide">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <circle cx="12" cy="6" r="1.5" fill="currentColor" />
                    <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-linecap="round" />
                    <circle cx="12" cy="18" r="1.5" fill="currentColor" />
                </svg>
            </button>

            <!-- Row 2: Numerics (7-9) & Multiplication -->
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                7
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                8
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                9
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Multiply">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Row 3: Numerics (4-6) & Subtraction -->
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                4
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                5
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                6
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Subtract">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                </svg>
            </button>

            <!-- Row 4: Numerics (1-3) & Addition -->
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                1
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                2
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                3
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs"
                aria-label="Add">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>

            <!-- Row 5: Structural Modifiers, Zero, Radix Point & Evaluation -->
            <button
                class="greenButton text-lg font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                00
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                0
            </button>
            <button
                class="greenButton text-2xl font-bold uppercase rounded-full text-slate-700 bg-white border border-slate-200/60 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-xs">
                .
            </button>
            <button
                class="greenButton text-xl font-bold uppercase rounded-full text-white bg-green-600 border border-green-700/30 hover:bg-green-500 active:scale-95 w-14 h-14 transition-all duration-150 flex justify-center items-center shadow-md shadow-green-600/20"
                aria-label="Equal To">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 9h15m-15 6h15" />
                </svg>
            </button>

            <audio id="clickSound" src="JS/click-sound.mp3" class="hidden"></audio>
        </section>
    </main>

    <script src="JS/calculation.js"></script>
    <script src="JS/app-UI.js"></script>
</body>

</html>
